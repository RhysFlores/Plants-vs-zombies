<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PvZ Portable — Web</title>
<style>
body{background:#1a1a2e;color:#eee;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;margin:0;height:100vh;overflow:hidden}
#canvas-container{display:flex;width:100vw;height:100vh;justify-content:center;align-items:center;background:#000}
canvas#canvas{display:block;background:#000;outline:0}
</style>
</head>
<body>
<div id="canvas-container">
  <canvas id="canvas" width="800" height="600" tabindex="0"></canvas>
</div>

<script>
"use strict";

var Module = {
  canvas: document.getElementById("canvas"),
  noInitialRun: true,
  onRuntimeInitialized: async function() {
    const collectedFiles = new Map();

    async function fetchAndAdd(path) {
      try {
        const res = await fetch(path);
        if (!res.ok) throw new Error("Failed to fetch " + path);
        const buf = await res.arrayBuffer();
        collectedFiles.set(path, new File([buf], path.split("/").pop()));
        console.log("Loaded:", path);
      } catch(e) {
        console.error(e);
      }
    }

    // Always load main.pak
    await fetchAndAdd("main.pak");

    // Load all expected properties files (from the original upload UI)
    const propertyFiles = [
      "properties/1",
      "properties/2",
      "properties/3",
      "properties/4"
    ];

    for (let file of propertyFiles) await fetchAndAdd(file);

    // Write into Emscripten FS
    for (let [path, file] of collectedFiles) {
      const parts = path.split("/");
      let dir = "/";
      for (let i = 0; i < parts.length - 1; i++) {
        dir += (i === 0 ? "" : "/") + parts[i];
        try { Module.FS.mkdir(dir); } catch(e){/* ignore if exists */}
      }
      const data = new Uint8Array(await file.arrayBuffer());
      Module.FS.writeFile("/" + path, data);
    }

    // Start the game
    Module.callMain([]);
  },
  print: console.log,
  printErr: console.warn,
  onAbort: function(err) { console.error(err); }
};

// Load the game JS
var script = document.createElement("script");
script.src = "pvz-portable.js";
script.async = true;
document.body.appendChild(script);
</script>
</body>
</html>
