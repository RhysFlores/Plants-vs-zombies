<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta content="width=device-width,initial-scale=1" name="viewport">
<title>PvZ Portable — Web</title>
<script src="https://cdn.jsdelivr.net/npm/jszip@3/dist/jszip.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#1a1a2e;color:#eee;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;min-height:100vh}
body.upload-mode{display:flex;flex-direction:column;align-items:stretch;justify-content:center;overflow-x:hidden;overflow-y:auto}
body.game-mode{overflow:hidden}
#canvas-container{display:none;width:100vw;height:100vh;position:fixed;inset:0;justify-content:center;align-items:center;background:#000;overflow:hidden}
#canvas-container:fullscreen{width:100%;height:100%}
canvas#canvas{display:block;background:#000;outline:0}

#save-bar{
  display:none;position:fixed;bottom:0;left:0;right:0;z-index:9999;
  background:linear-gradient(to top,rgba(0,0,0,.85) 0%,transparent 100%);
  padding:10px 16px 12px;gap:10px;flex-direction:row;
  align-items:center;justify-content:center;flex-wrap:wrap;
  transition:opacity .3s;opacity:0;pointer-events:none;
}
#save-bar.visible{opacity:1;pointer-events:all}
.sv-btn{
  display:inline-flex;align-items:center;gap:6px;padding:7px 14px;
  border-radius:8px;border:1.5px solid rgba(255,255,255,.18);
  background:rgba(30,30,50,.88);color:#f0f0f0;font-size:13px;
  font-weight:600;cursor:pointer;transition:background .15s,transform .1s;
  white-space:nowrap;user-select:none;
}
.sv-btn:hover{background:rgba(80,120,200,.5);transform:translateY(-1px)}
.sv-btn:active{transform:translateY(0)}
.sv-btn.green{border-color:rgba(100,220,130,.5)}
.sv-btn.green:hover{background:rgba(50,160,80,.5)}
.sv-btn.red{border-color:rgba(220,80,80,.5)}
.sv-btn.red:hover{background:rgba(160,50,50,.5)}
.sv-btn.amber{border-color:rgba(240,180,60,.5)}
.sv-btn.amber:hover{background:rgba(150,100,30,.5)}
#save-status{font-size:12px;color:rgba(200,240,200,.85);min-width:140px;text-align:center}
#save-hover-zone{display:none;position:fixed;bottom:0;left:0;right:0;height:40px;z-index:9998}
#sv-toast{
  position:fixed;bottom:72px;left:50%;transform:translateX(-50%);
  background:rgba(20,20,40,.94);border:1px solid rgba(100,200,255,.3);
  border-radius:10px;padding:10px 20px;font-size:13px;color:#d0f0ff;
  z-index:10000;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;
}
#sv-toast.show{opacity:1}
</style>
</head>
<body class="upload-mode">

<div id="upload-screen">
  <h1>PvZ Portable — Web</h1>
  <p>Automatically loading resources...</p>
</div>

<div id="canvas-container">
  <canvas id="canvas" width="800" height="600" tabindex="0"></canvas>
</div>

<div id="save-bar">
  <button class="sv-btn green" id="btn-export">💾 Export Save</button>
  <button class="sv-btn amber" id="btn-import">📂 Import Save</button>
  <button class="sv-btn red"   id="btn-clear" >🗑 Clear Save</button>
  <span id="save-status">⏳ Loading…</span>
  <input id="import-file-input" type="file" accept=".zip,.dat,.sav" style="display:none">
</div>
<div id="save-hover-zone"></div>
<div id="sv-toast"></div>

<script>
"use strict";

// ── CRITICAL: Module must be a true global before pvz-portable.js loads ──
var collectedFiles = new Map();
var hasPak = false, hasProperties = false, gameStarted = false;
var canvas = document.getElementById("canvas");

// Promise that resolves once Emscripten runtime is ready
var _resolveModuleReady, _rejectModuleReady;
var moduleReadyPromise = new Promise(function(res, rej){
  _resolveModuleReady = res;
  _rejectModuleReady  = rej;
});

// Global Module object — pvz-portable.js reads this at parse time
var Module = {
  canvas: canvas,
  noInitialRun: true,
  onRuntimeInitialized: function(){ _resolveModuleReady(); },
  onAbort: function(e){ _rejectModuleReady(new Error(e)); },
  print:    console.log,
  printErr: console.warn
};

// ── Save system constants ──
var SAVE_MOUNT = "/userdata";

var saveBar   = document.getElementById("save-bar");
var hoverZone = document.getElementById("save-hover-zone");
var statusEl  = document.getElementById("save-status");

function showSaveBar(){ saveBar.classList.add("visible"); }
function hideSaveBar(){ saveBar.classList.remove("visible"); }
function setSaveStatus(t){ statusEl.textContent = t; }
function toast(msg, ms){
  ms = ms || 3000;
  var el = document.getElementById("sv-toast");
  el.textContent = msg;
  el.classList.add("show");
  clearTimeout(el._t);
  el._t = setTimeout(function(){ el.classList.remove("show"); }, ms);
}

hoverZone.addEventListener("mouseenter", showSaveBar);
saveBar.addEventListener("mouseenter",   showSaveBar);
saveBar.addEventListener("mouseleave",   function(){ setTimeout(hideSaveBar, 600); });

function syncToIDB(cb){
  if(!Module.FS) return cb && cb();
  try{
    Module.FS.syncfs(false, function(err){
      if(err) console.warn("syncfs error:", err);
      setSaveStatus(err ? "⚠ Sync error" : "✅ Saved");
      cb && cb(err);
    });
  } catch(e){ console.warn("syncfs threw:", e); cb && cb(e); }
}

function syncFromIDB(cb){
  if(!Module.FS) return cb && cb();
  try{
    Module.FS.syncfs(true, function(err){
      if(err) console.warn("syncfs populate error:", err);
      cb && cb(err);
    });
  } catch(e){ console.warn("syncfs populate threw:", e); cb && cb(e); }
}

function listAllFiles(root){
  var files = [];
  function walk(dir){
    var entries;
    try{ entries = Module.FS.readdir(dir); } catch(e){ return; }
    for(var i = 0; i < entries.length; i++){
      var name = entries[i];
      if(name === "." || name === "..") continue;
      var full = dir === "/" ? "/" + name : dir + "/" + name;
      var stat;
      try{ stat = Module.FS.stat(full); } catch(e){ continue; }
      if(Module.FS.isDir(stat.mode)) walk(full);
      else files.push(full);
    }
  }
  walk(root);
  return files;
}

// ── Export ──
document.getElementById("btn-export").addEventListener("click", async function(){
  setSaveStatus("⏳ Syncing…");
  syncToIDB(async function(){
    var files = listAllFiles(SAVE_MOUNT);
    if(files.length === 0){
      toast("⚠ No save files found — play a bit first!");
      setSaveStatus("❌ Nothing to export");
      return;
    }
    var zip = new JSZip();
    for(var i = 0; i < files.length; i++){
      try{
        var data = Module.FS.readFile(files[i]);
        zip.file(files[i].replace(/^\//, ""), data);
      } catch(e){ console.warn("read error", files[i], e); }
    }
    var blob = await zip.generateAsync({type:"blob"});
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url;
    a.download = "pvz-save-" + new Date().toISOString().slice(0,10) + ".zip";
    a.click();
    URL.revokeObjectURL(url);
    toast("💾 Exported " + files.length + " file(s)");
    setSaveStatus("✅ Exported");
  });
});

// ── Import ──
document.getElementById("btn-import").addEventListener("click", function(){
  document.getElementById("import-file-input").click();
});

document.getElementById("import-file-input").addEventListener("change", async function(){
  var file = this.files[0];
  if(!file) return;
  this.value = "";
  setSaveStatus("⏳ Importing…");
  try{
    if(file.name.endsWith(".zip")){
      var zip = await JSZip.loadAsync(await file.arrayBuffer());
      var count = 0, promises = [];
      zip.forEach(function(relPath, entry){
        if(entry.dir) return;
        promises.push(entry.async("uint8array").then(function(data){
          var absPath = relPath.startsWith("userdata") ? "/" + relPath : SAVE_MOUNT + "/" + relPath;
          absPath = absPath.replace(/\/+/g, "/");
          var parts = absPath.split("/").filter(Boolean);
          var cur = "/";
          for(var j = 0; j < parts.length - 1; j++){
            cur += (cur === "/" ? "" : "/") + parts[j];
            try{ Module.FS.mkdir(cur); } catch(e){}
          }
          Module.FS.writeFile(absPath, data);
          count++;
        }));
      });
      await Promise.all(promises);
      syncToIDB(function(){
        toast("📂 Imported " + count + " file(s)! Refresh to apply.");
        setSaveStatus("✅ Imported – refresh!");
      });
    } else {
      var data = new Uint8Array(await file.arrayBuffer());
      try{ Module.FS.mkdir(SAVE_MOUNT); } catch(e){}
      Module.FS.writeFile(SAVE_MOUNT + "/" + file.name, data);
      syncToIDB(function(){
        toast("📂 Imported! Refresh to apply.");
        setSaveStatus("✅ Imported – refresh!");
      });
    }
  } catch(e){
    console.error("Import error:", e);
    toast("❌ Import failed: " + e.message);
    setSaveStatus("❌ Import error");
  }
});

// ── Clear ──
document.getElementById("btn-clear").addEventListener("click", function(){
  if(!confirm("Permanently delete all PvZ save data?\n(Export first to back it up.)")) return;
  setSaveStatus("⏳ Clearing…");
  try{
    var files = listAllFiles(SAVE_MOUNT);
    for(var i = 0; i < files.length; i++){
      try{ Module.FS.unlink(files[i]); } catch(e){}
    }
    syncToIDB(function(){ toast("🗑 Save data cleared."); setSaveStatus("🆕 No saves"); });
  } catch(e){
    toast("❌ Clear failed: " + e.message);
    setSaveStatus("❌ Error");
  }
});

// ── Auto-sync on game exit ──
window.onGameExit = function(){
  syncToIDB(function(){ console.log("[SaveSystem] Exit sync done."); });
};

// Periodic auto-save every 60s
setInterval(function(){
  if(gameStarted && Module.FS){
    syncToIDB(function(err){ if(!err) setSaveStatus("✅ Auto-saved"); });
  }
}, 60000);

// ── Resource loading ──
function normalizeResourcePath(path){
  var parts = path.replace(/\\/g,"/").split("/").filter(Boolean);
  if(parts.length === 0) return "";
  if(parts[0] === "main.pak" || parts[0] === "properties") return parts.join("/");
  return parts.length > 1 ? parts.slice(1).join("/") : parts[0];
}

async function autoLoadResources(){
  try{
    var pakResp = await fetch("main.pak");
    if(!pakResp.ok) throw new Error("main.pak not found");
    var pakData = await pakResp.arrayBuffer();
    collectedFiles.set("main.pak", new File([pakData], "main.pak"));

    var propertyFiles = ["partner.xml","partner.xml.sig","partner.xml.sig2","partner_logo.jpg"];
    for(var i = 0; i < propertyFiles.length; i++){
      var f = propertyFiles[i];
      var resp = await fetch("properties/" + f);
      if(!resp.ok) throw new Error("properties/" + f + " not found");
      var buf = await resp.arrayBuffer();
      collectedFiles.set("properties/" + f, new File([buf], f));
    }

    hasPak        = collectedFiles.has("main.pak");
    hasProperties = propertyFiles.every(function(f){ return collectedFiles.has("properties/"+f); });

    if(hasPak && hasProperties) startGame();
    else throw new Error("Required files missing");
  } catch(e){
    document.getElementById("upload-screen").innerHTML =
      "<p style='color:red;'>Failed to load resources: " + e.message + "</p>";
    console.error(e);
  }
}

async function startGame(){
  document.body.classList.remove("upload-mode");
  document.body.classList.add("game-mode");
  document.getElementById("upload-screen").style.display = "none";
  document.getElementById("canvas-container").style.display = "flex";

  // Wait for Emscripten WASM runtime to be ready
  await moduleReadyPromise;

  // Write game resource files into Emscripten FS
  for(var [path, file] of collectedFiles.entries()){
    var data  = new Uint8Array(await file.arrayBuffer());
    var parts = path.split("/");
    var dir   = "/";
    for(var i = 0; i < parts.length - 1; i++){
      dir += (dir === "/" ? "" : "/") + parts[i];
      try{ Module.FS.mkdir(dir); } catch(e){}
    }
    Module.FS.writeFile("/" + path, data);
  }

  // Mount IDBFS on /userdata so saves persist across sessions
  try{ Module.FS.mkdir(SAVE_MOUNT); } catch(e){}
  try{
    Module.FS.mount(Module.FS.filesystems.IDBFS, {autoPersist: true}, SAVE_MOUNT);
    setSaveStatus("⏳ Loading saves…");
    syncFromIDB(function(err){
      setSaveStatus(err ? "⚠ Save load error" : "✅ Saves loaded");
    });
  } catch(e){
    console.warn("[SaveSystem] IDBFS mount failed:", e);
    setSaveStatus("⚠ Save unavailable");
  }

  // Launch the game
  Module.callMain([]);
  gameStarted = true;

  // Reveal save bar briefly
  saveBar.style.display   = "flex";
  hoverZone.style.display = "block";
  showSaveBar();
  setTimeout(hideSaveBar, 4000);
}

autoLoadResources();
</script>

<!-- pvz-portable.js reads the global Module object — must NOT use async/defer -->
<script src="pvz-portable.js"></script>
</body>
</html>
